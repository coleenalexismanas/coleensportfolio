<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <style>
        body {
            font-family: Comic Sans MS, sans-serif;
            text-align: center;
            background-color: #dfd1ff;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #874caf;
            color: white;
            padding: 20px;
        }

        header nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            padding: 20px;
        }

        img {
            margin: 10px;
            border-radius: 100px;
        }

        .btn-group button {
            background-color: #874caf;
            color: white;
            padding: 10px 15px;
            margin: 10px 5px 20px 5px;
            border-radius: 5px;
            cursor: pointer;
        }

        .content {
            display: none;
            margin-top: 15px;
        }

        footer {
            background-color: #874caf;
            color: white;
            padding: 10px;
            width: 100%;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Portfolio</h1>
        <nav>
            <a href="#" onclick="scrollToTop()">Home</a>
            <a href="dashboard.html">Dashboard</a>            
            <a href="https://www.youtube.com/watch?v=MiSRagYgSzM&list=LL&index=20">More</a>
        </nav>
    </header>

    <main>
        <section class="profile">
            <img src="me.png" alt="Me" width="250">
            <h2>Manas, Coleen Alexis C.</h2>
            <p>BSCS-1A</p>

            <div class="btn-group">
                <button onclick="toggleContent('about')">About Me</button>
                <button onclick="toggleContent('skills')">Coding Skills</button>
                <button onclick="toggleContent('projects')">Projects</button>
            </div>

            <div id="about" class="content">
                 <p>I like drawing and reading manga.</p>
                <img src="mizi.png" alt="Mizi" width="150"> 
                <img src="sua.png" alt="Sua" width="110"> 
                <img src="luka.png" alt="Luka" width="120">         
            </div>

            <div id="skills" class="content">
                <h3>Coding Skills</h3>
                <ul>
                    <li>HTML & CSS</li>
                    <li>Java</li>
                    <li>C++</li>
                </ul>
            </div>

            <div id="projects" class="content">
                <h3>Projects</h3>
                <ul>
                    <li>This Portfolio Website</li>
                    <li><a href="https://coleenalexismanas.github.io/WEBPAGE/" target="_blank">My First Webpage</a></li>
                </ul>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Manas, Coleen Alexis C.</p>
    </footer>

    <script>
        function toggleContent(sectionId) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.getElementById(sectionId).style.display = 'block';
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
